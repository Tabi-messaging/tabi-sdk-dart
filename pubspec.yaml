name: tabi_sdk
description: >-
  Dart and Flutter client for the Tabi WhatsApp Business Messaging API. Send
  messages, manage channels, webhooks, campaigns, and automations with the same
  REST shapes as the official PHP and Python SDKs.
version: 0.1.0
homepage: https://tabi.africa/sdks
repository: https://github.com/Tabi-messaging/tabi-sdk-dart
documentation: https://pub.dev/documentation/tabi_sdk/latest/
issue_tracker: https://github.com/Tabi-messaging/tabi-sdk-dart/issues

environment:
  sdk: ">=3.0.0 <4.0.0"

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

topics:
  - api
  - http
  - whatsapp

dependencies:
  dio: ^5.4.0
  meta: ^1.11.0

dev_dependencies:
  test: ^1.25.0
  lints: ^4.0.0
